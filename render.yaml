services:
  - type: web
    name: shortsmith-web
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm run start -- --hostname 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_DEMO_MODE
        value: "false"
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://shortsmith-api.onrender.com
      - key: NEXTAUTH_URL
        value: https://shortsmith-web.onrender.com
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false

  - type: web
    name: shortsmith-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile.api
    dockerContext: .
    autoDeploy: true
    healthCheckPath: /ready
    envVars:
      - key: DEMO_MODE
        value: "false"
      - key: ENVIRONMENT
        value: production
      - key: BACKEND_URL
        value: https://shortsmith-api.onrender.com
      - key: BACKEND_CORS_ORIGINS
        value: https://shortsmith-web.onrender.com
      - key: TRUSTED_HOSTS
        value: shortsmith-api.onrender.com,shortsmith-web.onrender.com
      - key: LOG_LEVEL
        value: INFO
      - key: MAX_UPLOAD_SIZE_MB
        value: "1024"
      - key: DATABASE_URL
        fromDatabase:
          name: shortsmith-db
          property: connectionString
      - key: UPSTASH_REDIS_URL
        fromDatabase:
          name: shortsmith-redis
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_DRIVE_FOLDER_ID
        sync: false
      - key: GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false

  - type: worker
    name: shortsmith-worker
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile.worker
    dockerContext: .
    autoDeploy: true
    envVars:
      - key: DEMO_MODE
        value: "false"
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: MAX_UPLOAD_SIZE_MB
        value: "1024"
      - key: DATABASE_URL
        fromDatabase:
          name: shortsmith-db
          property: connectionString
      - key: UPSTASH_REDIS_URL
        fromDatabase:
          name: shortsmith-redis
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_DRIVE_FOLDER_ID
        sync: false
      - key: GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false

databases:
  - name: shortsmith-db
    databaseName: shortsmith
    user: shortsmith
    plan: free
  - name: shortsmith-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
