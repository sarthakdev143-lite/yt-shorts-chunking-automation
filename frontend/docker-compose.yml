version: "3.9"

services:
  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"
    volumes:
      - ./:/app
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://backend:8000
      NEXT_PUBLIC_DEMO_MODE: "false"
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-https://example.supabase.co}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-demo-anon-key}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-secret}
    depends_on:
      - backend

  backend:
    image: python:3.12-slim
    working_dir: /app
    command: sh -c "apt-get update && apt-get install -y ffmpeg && pip install -r backend/requirements.txt && uvicorn backend.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./:/app
      - ${GOOGLE_DRIVE_SERVICE_ACCOUNT_FILE_HOST:-./secrets/google-drive-service-account.json}:/run/secrets/google-drive-service-account.json:ro
    ports:
      - "8000:8000"
    environment:
      DEMO_MODE: ${DEMO_MODE:-false}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/shortsmith}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GOOGLE_DRIVE_SERVICE_ACCOUNT_FILE: ${GOOGLE_DRIVE_SERVICE_ACCOUNT_FILE:-/run/secrets/google-drive-service-account.json}
      GOOGLE_DRIVE_FOLDER_ID: ${GOOGLE_DRIVE_FOLDER_ID:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      UPSTASH_REDIS_URL: ${UPSTASH_REDIS_URL:-redis://redis:6379/0}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-secret}
    depends_on:
      - postgres
      - redis

  worker:
    image: python:3.12-slim
    working_dir: /app
    command: sh -c "apt-get update && apt-get install -y ffmpeg && pip install -r backend/requirements.txt && celery -A backend.workers.tasks worker --loglevel=info"
    volumes:
      - ./:/app
      - ${GOOGLE_DRIVE_SERVICE_ACCOUNT_FILE_HOST:-./secrets/google-drive-service-account.json}:/run/secrets/google-drive-service-account.json:ro
    environment:
      DEMO_MODE: ${DEMO_MODE:-false}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/shortsmith}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GOOGLE_DRIVE_SERVICE_ACCOUNT_FILE: ${GOOGLE_DRIVE_SERVICE_ACCOUNT_FILE:-/run/secrets/google-drive-service-account.json}
      GOOGLE_DRIVE_FOLDER_ID: ${GOOGLE_DRIVE_FOLDER_ID:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      UPSTASH_REDIS_URL: ${UPSTASH_REDIS_URL:-redis://redis:6379/0}
    depends_on:
      - backend
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shortsmith
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
